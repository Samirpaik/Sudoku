<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Sudoku: Cloud Edition</title>
    <style>
        /* CSS Variables & Themes */
        :root {
            --bg-color: #f0f4f8;
            --text-color: #2d3748;
            --board-bg: #ffffff;
            --border-light: #cbd5e0;
            --border-dark: #2d3748;
            --primary: #4299e1;
            --primary-hover: #3182ce;
            --selected: #bee3f8;
            --related: #e2e8f0;
            --same-num: #90cdf4;
            --error: #e53e3e;
            --error-bg: #fff5f5;
            --fixed-text: #1a202c;
            --user-text: #3182ce;
            --note-text: #718096;
            --overlay-bg: rgba(255, 255, 255, 0.98);
            --tool-bg: #e2e8f0;
            --tool-hover: #cbd5e0;
            --stats-card-bg: #ffffff;
            --stripe-color: rgba(128, 128, 128, 0.15);
            --cage-border: rgba(50, 50, 50, 0.5);
        }

        body.theme-dark {
            --bg-color: #1a202c;
            --text-color: #e2e8f0;
            --board-bg: #2d3748;
            --border-light: #4a5568;
            --border-dark: #718096;
            --primary: #9f7aea;
            --primary-hover: #805ad5;
            --selected: #4a5568;
            --related: #2d3748;
            --same-num: #4a5568;
            --error: #fc8181;
            --error-bg: #440000;
            --fixed-text: #ffffff;
            --user-text: #d6bcfa;
            --note-text: #a0aec0;
            --overlay-bg: rgba(26, 32, 44, 0.98);
            --tool-bg: #4a5568;
            --tool-hover: #718096;
            --stats-card-bg: #2d3748;
            --stripe-color: rgba(255, 255, 255, 0.08);
            --cage-border: rgba(200, 200, 200, 0.6);
        }

        /* Ocean Theme */
        body.theme-ocean {
            --bg-color: #e0f7fa;
            --text-color: #004d40;
            --board-bg: #ffffff;
            --border-light: #b2ebf2;
            --border-dark: #006064;
            --primary: #00acc1;
            --primary-hover: #00838f;
            --selected: #b2ebf2;
            --related: #e0f7fa;
            --same-num: #80deea;
            --error: #d32f2f;
            --error-bg: #ffcdd2;
            --fixed-text: #004d40;
            --user-text: #00acc1;
            --note-text: #00796b;
            --overlay-bg: rgba(224, 247, 250, 0.95);
            --tool-bg: #b2ebf2;
            --tool-hover: #80deea;
            --stats-card-bg: #ffffff;
            --stripe-color: rgba(0, 96, 100, 0.1);
            --cage-border: rgba(0, 100, 100, 0.6);
        }

        /* Base Setup - Mobile Optimized */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: manipulation; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background-color 0.3s, color 0.3s; overflow-x: hidden; }

        /* Full Screen Auth Overlay */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.4s;
        }
        .auth-card {
            background: var(--board-bg); padding: 40px 30px; border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 15px; text-align: center;
        }
        .auth-card h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        .auth-card p { margin-bottom: 20px; color: var(--note-text); }
        .auth-input { padding: 15px; border: 2px solid var(--border-light); border-radius: 8px; font-size: 1rem; background: var(--bg-color); color: var(--text-color); outline: none; transition: border-color 0.2s;}
        .auth-input:focus { border-color: var(--primary); }
        .auth-btn { padding: 15px; border: none; border-radius: 8px; background: var(--primary); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(66, 153, 225, 0.3); }
        .auth-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .auth-switch { background: none; border: none; color: var(--primary); font-size: 0.9rem; cursor: pointer; margin-top: 10px; text-decoration: underline; }
        #auth-error { color: var(--error); font-size: 0.9rem; display: none; }

        /* Main Game Layout */
        #app-container { display: none; width: 100%; max-width: 500px; padding: 15px; flex: 1; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header h1 { font-size: 1.8rem; color: var(--primary); }
        .btn-group { display: flex; gap: 5px; }
        .icon-btn { background: var(--tool-bg); border: none; font-size: 1.2rem; cursor: pointer; padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-color); transition: 0.2s; }
        .icon-btn:hover { background: var(--tool-hover); transform: scale(1.05); }

        .stats-bar { display: flex; flex-direction: column; gap: 10px; background: var(--board-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .stat { font-weight: 600; font-size: 1rem; }
        select { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-light); font-size: 0.9rem; font-weight: 600; background: var(--bg-color); color: var(--text-color); outline: none; }

        .mode-hint { font-size: 0.85rem; font-weight: 600; color: var(--primary); text-align: center; margin-bottom: 15px; }

        /* Fluid Board */
        .board-wrapper { width: 100%; position: relative; margin-bottom: 20px; display: flex; justify-content: center;}
        .board { width: 100%; max-width: 450px; display: grid; grid-template-columns: repeat(9, 1fr); background: var(--border-dark); border: 3px solid var(--border-dark); gap: 1px; aspect-ratio: 1; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        
        .cell { background: var(--board-bg); display: flex; justify-content: center; align-items: center; font-size: clamp(1.2rem, 6vw, 2rem); font-weight: 500; cursor: pointer; position: relative; transition: background-color 0.2s, color 0.2s; user-select: none; }
        .cell:nth-child(3n) { border-right: 2px solid var(--border-dark); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--border-dark); }

        .cell.fixed { color: var(--fixed-text); font-weight: 700; }
        .cell.user { color: var(--user-text); }
        .cell.selected { background-color: var(--selected) !important; }
        .cell.related { background-color: var(--related); }
        .cell.same-num { background-color: var(--same-num) !important; }
        .cell.error { color: var(--error); background-color: var(--error-bg); animation: shake 0.4s; }

        /* Variant Visuals */
        .ice-overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 2; border: 1px solid rgba(255,255,255,0.4); background-image: linear-gradient(135deg, rgba(255,255,255,0.5) 25%, transparent 25%), linear-gradient(225deg, rgba(255,255,255,0.5) 25%, transparent 25%); background-size: 15px 15px; }
        .cell.ice-1 .ice-overlay { opacity: 0.55; background-color: rgba(178, 235, 242, 0.4); }
        .cell.ice-2 .ice-overlay { opacity: 0.85; background-color: rgba(128, 222, 234, 0.7); }
        .cell.ice-3 .ice-overlay { opacity: 1; background-color: rgba(77, 208, 225, 0.9); }
        @keyframes shockwave-flash { 0%, 100% { box-shadow: inset 0 0 0px #00e5ff; background-color: transparent; } 50% { box-shadow: inset 0 0 25px #00e5ff; background-color: rgba(0, 229, 255, 0.5); } }
        .cell.shockwave::after { content: ''; position: absolute; inset: 0; animation: shockwave-flash 0.5s ease-out; pointer-events: none; z-index: 5; }

        .parity-overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 1; }
        .cell.parity-even .parity-overlay { opacity: 1; background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, var(--stripe-color) 5px, var(--stripe-color) 10px); }

        .ineq-h, .ineq-v { position: absolute; background: var(--bg-color); color: var(--primary); font-size: 1rem; font-family: monospace; font-weight: bold; z-index: 4; display: none; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; box-shadow: 0 0 0 2px var(--board-bg); pointer-events: none;}
        .ineq-h.active, .ineq-v.active { display: flex; }
        .ineq-h { right: -11px; top: 50%; transform: translateY(-50%); }
        .ineq-v { bottom: -11px; left: 50%; transform: translateX(-50%); }

        .cage-overlay { position: absolute; inset: 2px; pointer-events: none; z-index: 1; border: 0px dashed var(--cage-border); border-radius: 2px; }
        .cage-t .cage-overlay { border-top-width: 2px; } .cage-b .cage-overlay { border-bottom-width: 2px; } .cage-l .cage-overlay { border-left-width: 2px; } .cage-r .cage-overlay { border-right-width: 2px; }
        .cage-sum { position: absolute; top: 2px; left: 3px; font-size: 0.65rem; font-weight: 700; color: var(--text-color); z-index: 2; line-height: 1; opacity: 0.8; display: none; pointer-events: none;}
        .cage-sum.active { display: block; }

        .notes-grid { position: absolute; inset: 2px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); pointer-events: none; z-index: 3; }
        .note { display: flex; justify-content: center; align-items: center; font-size: clamp(0.5rem, 2vw, 0.7rem); color: var(--note-text); }
        .val { z-index: 3; position: relative; pointer-events: none;}

        /* Mobile Controls */
        .controls-wrapper { margin-top: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px;}
        .tools { display: flex; justify-content: space-between; gap: 8px; }
        .tool-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: var(--tool-bg); cursor: pointer; font-weight: bold; color: var(--text-color); font-size: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;}
        .tool-btn.active { background: var(--primary); color: white; }
        
        .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; justify-content: center; }
        .numpad button:nth-child(6) { grid-column: 1; }
        .num-btn { padding: 18px 0; font-size: 1.6rem; font-weight: 700; border: none; border-radius: 10px; background: var(--board-bg); color: var(--primary); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: 0.1s; }
        .num-btn:active { transform: translateY(3px); box-shadow: none; }
        .num-btn.active { background: var(--primary); color: white; transform: translateY(3px); box-shadow: none; }

        /* Overlays */
        .overlay { position: absolute; inset: 0; background: var(--overlay-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 8px; opacity: 0; pointer-events: none; transition: 0.3s; padding: 20px; text-align: center; }
        .overlay.active { opacity: 1; pointer-events: all; }
        .overlay h2 { color: var(--primary); font-size: 2.2rem; margin-bottom: 10px; }
        
        .stats-highlight { background: linear-gradient(135deg, var(--primary), #8e44ad); color: white; padding: 25px; border-radius: 16px; width: 100%; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.15);}
        .stats-highlight .icon { font-size: 3rem; display: block; animation: bounce 2s infinite; }
        .stats-highlight .stats-value { font-size: 3.5rem; font-weight: 900; line-height: 1; letter-spacing: 2px; }
        .stat-row-stats { display: flex; justify-content: space-between; font-size: 1.1rem; margin-bottom: 15px; font-weight: bold; color: var(--text-color); border-bottom: 1px solid var(--border-light); padding-bottom: 8px;}

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }

        @media (min-width: 500px) {
            .numpad { grid-template-columns: repeat(9, 1fr); }
            .numpad button:nth-child(6) { grid-column: auto; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1>Sudoku Cloud</h1>
            <p>Sign in to sync your 2000+ victories across all your devices.</p>
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <p id="auth-error"></p>
            <button class="auth-btn" id="login-btn" onclick="authManager.login()">Log In</button>
            <button class="auth-switch" onclick="authManager.toggleMode()" id="auth-toggle">Need an account? Sign Up</button>
        </div>
    </div>

    <div id="app-container">
        <div class="header">
            <h1>Sudoku</h1>
            <div class="btn-group">
                <button class="icon-btn" id="sound-btn" onclick="game.toggleSound()" title="Toggle Sound">🔊</button>
                <button class="icon-btn" onclick="game.cycleTheme()" title="Change Theme">🌓</button>
                <button class="icon-btn" onclick="game.showStats()" title="Player Statistics">📊</button>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-row">
                <select id="game-mode" onchange="game.newGame()">
                    <option value="classic" selected>Classic</option>
                    <option value="ice">Ice Breaker</option>
                    <option value="even-odd">Even-Odd</option>
                    <option value="greater">Greater Than</option>
                    <option value="killer">Killer Sudoku</option>
                </select>
                <select id="difficulty" onchange="game.newGame()">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <div class="stat-row" style="border:none; margin:0; padding:0;">
                <div class="stat">Mistakes: <span id="mistakes" style="color: var(--error);">0</span>/3</div>
                <div class="stat" id="timer" style="font-family: monospace; font-size: 1.2rem;">00:00</div>
            </div>
        </div>
        
        <div id="mode-hint" class="mode-hint">Fill the grid with numbers 1 to 9.</div>

        <div class="board-wrapper">
            <div class="board" id="board"></div>
            
            <div class="overlay" id="pause-screen">
                <h2>Paused</h2>
                <button class="auth-btn" onclick="game.togglePause()">Resume</button>
            </div>

            <div class="overlay" id="win-screen">
                <h2 id="win-title">Puzzle Solved!</h2>
                <p>Time: <span id="final-time" style="font-weight:bold;">00:00</span></p>
                <button class="auth-btn" onclick="game.newGame()" style="margin-top: 15px;">Next Game</button>
            </div>
            
            <div class="overlay" id="lose-screen">
                <h2>Game Over</h2>
                <p>You made 3 mistakes.</p>
                <button class="auth-btn" onclick="game.newGame()" style="margin-top: 15px;">Try Again</button>
            </div>

            <div class="overlay" id="stats-screen">
                <div class="stats-highlight">
                    <span class="icon">🏆</span>
                    <div class="stats-value" id="stat-total-games">...</div>
                    <div class="stats-label">Cloud Victories</div>
                </div>
                <div style="width: 100%; margin-bottom: 25px;">
                    <h3 style="margin-bottom: 15px; color:var(--primary);">Best Times</h3>
                    <div class="stat-row-stats"><span>Easy</span> <span id="stat-best-easy">--:--</span></div>
                    <div class="stat-row-stats"><span>Medium</span> <span id="stat-best-medium">--:--</span></div>
                    <div class="stat-row-stats"><span>Hard</span> <span id="stat-best-hard">--:--</span></div>
                </div>
                <div class="btn-group" style="justify-content: center; gap: 15px;">
                    <button class="auth-btn" onclick="game.hideStats()">Back</button>
                    <button class="auth-btn" style="background:var(--error);" onclick="authManager.logout()">Sign Out</button>
                </div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="tools">
                <button class="tool-btn" id="erase-btn" onclick="game.toggleEraser()">Erase</button>
                <button class="tool-btn" id="notes-btn" onclick="game.toggleNotes()">Notes</button>
                <button class="tool-btn" onclick="game.useHint()">Hint</button>
                <button class="tool-btn" id="pause-btn" onclick="game.togglePause()">Pause</button>
            </div>
            <div class="numpad" id="numpad"></div>
        </div>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvTGohnUusTQD8WgK6Wg7HIZAvFANEifU",
    authDomain: "sudoku-a736c.firebaseapp.com",
    projectId: "sudoku-a736c",
    storageBucket: "sudoku-a736c.firebasestorage.app",
    messagingSenderId: "38408666563",
    appId: "1:38408666563:web:5501dec254042cfe8c9176"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // AUTHENTICATION MANAGER
  window.authManager = {
      isSignUp: false,
      user: null,

      toggleMode() {
          this.isSignUp = !this.isSignUp;
          document.getElementById('login-btn').textContent = this.isSignUp ? 'Sign Up' : 'Log In';
          document.getElementById('auth-toggle').textContent = this.isSignUp ? 'Already have an account? Log In' : 'Need an account? Sign Up';
          document.getElementById('auth-error').style.display = 'none';
      },

      async login() {
          const email = document.getElementById('email').value;
          const password = document.getElementById('password').value;
          const errorEl = document.getElementById('auth-error');
          errorEl.style.display = 'none';

          try {
              if (this.isSignUp) {
                  await createUserWithEmailAndPassword(auth, email, password);
              } else {
                  await signInWithEmailAndPassword(auth, email, password);
              }
          } catch (error) {
              errorEl.textContent = error.message.replace('Firebase: ', '');
              errorEl.style.display = 'block';
          }
      },

      async logout() {
          await signOut(auth);
      }
  };

  // Cloud Sync Listener
  onAuthStateChanged(auth, async (user) => {
      if (user) {
          window.authManager.user = user;
          document.getElementById('auth-screen').style.opacity = '0';
          setTimeout(() => {
              document.getElementById('auth-screen').style.display = 'none';
              document.getElementById('app-container').style.display = 'flex';
          }, 400);
          
          try {
              // Load or Create Cloud Stats
              const userRef = doc(db, "users", user.uid);
              const docSnap = await getDoc(userRef);
              
              if (docSnap.exists()) {
                  window.game.playerStats = docSnap.data();
              } else {
                  // INJECT 2133 HISTORICAL WINS ON NEW ACCOUNT CREATION
                  window.game.playerStats = {
                      totalGames: 2133, 
                      bestTimes: { easy: Infinity, medium: Infinity, hard: Infinity }
                  };
                  await setDoc(userRef, window.game.playerStats);
              }
          } catch (error) {
              console.error("Firestore Error:", error);
              // Fallback to local storage gracefully if Firestore isn't setup properly
              window.game.loadDataFallback();
          }
          
          // CRITICAL BUG FIX: Only trigger the board build once!
          if(!window.game.isInitialized) {
              window.game.isInitialized = true;
              window.game.newGame();
          } else {
              window.game.updateStatsUI();
          }

      } else {
          window.authManager.user = null;
          document.getElementById('auth-screen').style.display = 'flex';
          document.getElementById('auth-screen').style.opacity = '1';
          document.getElementById('app-container').style.display = 'none';
          if(window.game) window.game.isPaused = true;
      }
  });

  // Cloud Save API for Game Over screen
  window.saveToCloud = async (stats) => {
      if(auth.currentUser) {
          try {
              await updateDoc(doc(db, "users", auth.currentUser.uid), stats);
          } catch (e) {
              console.warn("Could not save to cloud. Saved locally.");
          }
      }
  };
</script>

<script>
class SudokuGame {
    constructor() {
        this.boardEl = document.getElementById('board');
        this.numpadEl = document.getElementById('numpad');
        
        this.selectedCell = null;   
        this.selectedNumber = null; 
        this.notesMode = false;
        this.isPaused = false;
        this.isInitialized = false;
        
        this.solution = Array.from({length: 9}, () => Array(9).fill(0));
        this.grid = Array.from({length: 9}, () => Array(9).fill(0));
        this.notes = Array.from({length: 9}, () => Array.from({length: 9}, () => new Set()));
        
        this.ice = Array.from({length: 9}, () => Array(9).fill(0));
        this.parity = Array.from({length: 9}, () => Array(9).fill(null));
        this.hIneq = Array.from({length: 9}, () => Array(9).fill(''));
        this.vIneq = Array.from({length: 9}, () => Array(9).fill(''));
        this.cages = [];
        this.cageGrid = Array.from({length: 9}, () => Array(9).fill(null));
        
        this.score = 0;
        this.mistakes = 0;
        this.time = 0;
        this.timerInterval = null;
        
        this.soundEnabled = true;
        this.audioCtx = null;
        
        // Base stats (Cloud overrides this)
        this.playerStats = { totalGames: 2133, bestTimes: { easy: Infinity, medium: Infinity, hard: Infinity } };
        this.themes = ['theme-light', 'theme-dark', 'theme-ocean'];
        this.currentThemeIndex = 0;

        // Initialize UI framework immediately, but DO NOT start the game yet.
        this.initUI();
        this.setupKeyboard();
        
        // Setup Theme
        const savedTheme = localStorage.getItem('sudokuTheme');
        if (savedTheme !== null) {
            this.currentThemeIndex = parseInt(savedTheme);
            this.applyTheme();
        }
    }

    initAudio() {
        if (!this.soundEnabled) return;
        if (!this.audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) this.audioCtx = new AudioContext();
        }
        if (this.audioCtx && this.audioCtx.state === 'suspended') this.audioCtx.resume();
    }

    toggleSound() {
        this.soundEnabled = !this.soundEnabled;
        document.getElementById('sound-btn').textContent = this.soundEnabled ? '🔊' : '🔇';
        if (this.soundEnabled) this.initAudio();
    }

    playIceBreakSound() {
        if (!this.soundEnabled || !this.audioCtx) return;
        const time = this.audioCtx.currentTime;
        const osc = this.audioCtx.createOscillator();
        osc.type = 'sine'; osc.frequency.setValueAtTime(2800, time); osc.frequency.exponentialRampToValueAtTime(800, time + 0.15);
        const gain = this.audioCtx.createGain();
        gain.gain.setValueAtTime(0.4, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
        osc.connect(gain); gain.connect(this.audioCtx.destination); osc.start(time); osc.stop(time + 0.15);
    }

    playIceCrackSound(delayInSeconds) {
        if (!this.soundEnabled || !this.audioCtx) return;
        const time = this.audioCtx.currentTime + delayInSeconds;
        const osc = this.audioCtx.createOscillator();
        osc.type = 'square'; osc.frequency.setValueAtTime(4000, time); osc.frequency.exponentialRampToValueAtTime(1000, time + 0.05);
        const gain = this.audioCtx.createGain();
        gain.gain.setValueAtTime(0.05, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
        osc.connect(gain); gain.connect(this.audioCtx.destination); osc.start(time); osc.stop(time + 0.05);
    }

    // Local Fallback if Firebase isn't configured
    loadDataFallback() {
        const savedStats = localStorage.getItem('sudokuStats');
        if (savedStats) {
            let local = JSON.parse(savedStats);
            if (local.totalGames < 2133) local.totalGames += 2133;
            this.playerStats = local;
        }
        this.saveLocalStats();
    }

    saveLocalStats() { localStorage.setItem('sudokuStats', JSON.stringify(this.playerStats)); }

    cycleTheme() {
        this.currentThemeIndex = (this.currentThemeIndex + 1) % this.themes.length;
        this.applyTheme();
        localStorage.setItem('sudokuTheme', this.currentThemeIndex);
    }

    applyTheme() {
        this.themes.forEach(theme => document.body.classList.remove(theme));
        const themeToApply = this.themes[this.currentThemeIndex];
        if (themeToApply !== 'theme-light') document.body.classList.add(themeToApply);
    }

    showStats() {
        const wasPaused = this.isPaused;
        if (!wasPaused) this.togglePause(); 
        this.updateStatsUI();
        document.getElementById('stats-screen').classList.add('active');
        this.resumeAfterStats = !wasPaused; 
    }

    updateStatsUI() {
        document.getElementById('stat-total-games').textContent = this.playerStats.totalGames;
        const formatBestTime = (time) => time === Infinity ? '--:--' : this.formatTime(time);
        document.getElementById('stat-best-easy').textContent = formatBestTime(this.playerStats.bestTimes.easy);
        document.getElementById('stat-best-medium').textContent = formatBestTime(this.playerStats.bestTimes.medium);
        document.getElementById('stat-best-hard').textContent = formatBestTime(this.playerStats.bestTimes.hard);
    }

    hideStats() {
        document.getElementById('stats-screen').classList.remove('active');
        if (this.resumeAfterStats) this.togglePause(); 
    }

    initUI() {
        // Runs EXACTLY ONCE on boot
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.dataset.r = r; cell.dataset.c = c;
                cell.onclick = () => this.handleCellClick(r, c);
                
                const parityOverlay = document.createElement('div'); parityOverlay.className = 'parity-overlay';
                const iceOverlay = document.createElement('div'); iceOverlay.className = 'ice-overlay';
                const cageOverlay = document.createElement('div'); cageOverlay.className = 'cage-overlay';
                const cageSum = document.createElement('div'); cageSum.className = 'cage-sum'; cageSum.id = `cage-sum-${r}-${c}`;
                const valSpan = document.createElement('span'); valSpan.className = 'val';

                const notesGrid = document.createElement('div'); notesGrid.className = 'notes-grid';
                for(let i=1; i<=9; i++) {
                    const n = document.createElement('div'); n.className = 'note'; n.id = `note-${r}-${c}-${i}`;
                    notesGrid.appendChild(n);
                }

                cell.appendChild(parityOverlay); cell.appendChild(iceOverlay); cell.appendChild(cageOverlay); cell.appendChild(cageSum); cell.appendChild(valSpan); cell.appendChild(notesGrid);

                if (c % 3 !== 2) { const ineqH = document.createElement('div'); ineqH.className = 'ineq-h'; ineqH.id = `ineq-h-${r}-${c}`; cell.appendChild(ineqH); }
                if (r % 3 !== 2) { const ineqV = document.createElement('div'); ineqV.className = 'ineq-v'; ineqV.id = `ineq-v-${r}-${c}`; cell.appendChild(ineqV); }

                this.boardEl.appendChild(cell);
            }
        }

        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn'; btn.id = `numpad-${i}`; btn.textContent = i;
            btn.onclick = () => this.handleNumpadClick(i);
            this.numpadEl.appendChild(btn);
        }
    }

    newGame() {
        this.resetState();
        this.generatePuzzle();
        this.renderBoard();
        this.startTimer();
    }

    resetState() {
        clearInterval(this.timerInterval);
        this.mode = document.getElementById('game-mode').value;
        this.time = 0; this.mistakes = 0;
        this.selectedCell = null; this.selectedNumber = null;
        this.isPaused = false;
        
        const hintEl = document.getElementById('mode-hint');
        if (this.mode === 'classic') hintEl.textContent = "Fill the grid with numbers 1 to 9.";
        if (this.mode === 'ice') hintEl.textContent = "Break the ice by placing correct numbers!";
        if (this.mode === 'even-odd') hintEl.textContent = "Striped cells must be Even. Blank cells must be Odd.";
        if (this.mode === 'greater') hintEl.textContent = "Pay attention to the > and < signs!";
        if (this.mode === 'killer') hintEl.textContent = "Cages sum to the top number. No repeats inside a cage!";

        this.updateStats();
        this.updateNumpadUI();
        
        document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
        document.getElementById('pause-btn').textContent = 'Pause';
        
        this.cages = [];
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                this.grid[r][c] = 0; this.solution[r][c] = 0; this.ice[r][c] = 0; this.parity[r][c] = null;
                this.hIneq[r][c] = ''; this.vIneq[r][c] = ''; this.cageGrid[r][c] = null; this.notes[r][c].clear();
            }
        }
    }

    generatePuzzle() {
        for (let i = 0; i < 9; i += 3) this.fillBox(i, i);
        this.solveGrid(this.solution);
        
        for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) this.grid[r][c] = this.solution[r][c];

        if (this.mode === 'greater') {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (c % 3 !== 2) this.hIneq[r][c] = this.solution[r][c] > this.solution[r][c+1] ? '>' : '<';
                    if (r % 3 !== 2) this.vIneq[r][c] = this.solution[r][c] > this.solution[r+1][c] ? 'v' : '^';
                }
            }
        }

        if (this.mode === 'killer') this.generateKillerCages();

        const difficultyMap = { easy: 35, medium: 45, hard: 55 };
        let attempts = difficultyMap[document.getElementById('difficulty').value];
        
        if (this.mode === 'even-odd') attempts += 10;
        if (this.mode === 'greater') attempts += 5; 
        if (this.mode === 'killer') attempts = 81; 
        
        attempts = Math.min(attempts, 81);

        let removed = 0;
        while (removed < attempts) {
            let r = Math.floor(Math.random() * 9), c = Math.floor(Math.random() * 9);
            if (this.grid[r][c] !== 0) { this.grid[r][c] = 0; removed++; }
        }

        if (this.mode === 'ice') {
            for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) if (this.grid[r][c] === 0) this.ice[r][c] = 2; 
        }

        if (this.mode === 'even-odd') {
            for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) this.parity[r][c] = (this.solution[r][c] % 2 === 0) ? 'even' : 'odd';
        }
    }

    generateKillerCages() {
        let unassigned = [];
        for(let r=0; r<9; r++) for(let c=0; c<9; c++) unassigned.push({r,c});
        for(let i = unassigned.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [unassigned[i], unassigned[j]] = [unassigned[j], unassigned[i]]; }

        let cageId = 0;
        while(unassigned.length > 0) {
            let start = unassigned.pop();
            if (this.cageGrid[start.r][start.c] !== null) continue;

            let targetSize = Math.floor(Math.random() * 4) + 2; 
            let cageCells = [start];
            this.cageGrid[start.r][start.c] = cageId;

            while(cageCells.length < targetSize) {
                let neighbors = [];
                for(let cell of cageCells) {
                    const dirs = [[0,1], [1,0], [0,-1], [-1,0]];
                    for(let [dr, dc] of dirs) {
                        let nr = cell.r + dr, nc = cell.c + dc;
                        if(nr>=0 && nr<9 && nc>=0 && nc<9 && this.cageGrid[nr][nc] === null) {
                            let num = this.solution[nr][nc];
                            if (!cageCells.some(cc => this.solution[cc.r][cc.c] === num)) neighbors.push({r: nr, c: nc});
                        }
                    }
                }
                if(neighbors.length === 0) break;
                let pick = neighbors[Math.floor(Math.random() * neighbors.length)];
                cageCells.push(pick); this.cageGrid[pick.r][pick.c] = cageId;
            }
            
            let sum = cageCells.reduce((acc, cell) => acc + this.solution[cell.r][cell.c], 0);
            cageCells.sort((a, b) => a.r !== b.r ? a.r - b.r : a.c - b.c);
            this.cages.push({ sum, cells: cageCells, id: cageId }); cageId++;
        }
    }

    fillBox(rowStart, colStart) {
        for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) {
            let num; do { num = Math.floor(Math.random() * 9) + 1; } while (!this.isSafe(this.solution, rowStart + i, colStart + j, num));
            this.solution[rowStart + i][colStart + j] = num;
        }
    }

    isSafe(grid, row, col, num) {
        for (let x = 0; x < 9; x++) if (grid[row][x] === num || grid[x][col] === num) return false;
        let startRow = row - row % 3, startCol = col - col % 3;
        for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) if (grid[i + startRow][j + startCol] === num) return false;
        return true;
    }

    solveGrid(grid) {
        let row = -1, col = -1, isEmpty = false;
        for (let i = 0; i < 9; i++) {
            for (let j = 0; j < 9; j++) if (grid[i][j] === 0) { row = i; col = j; isEmpty = true; break; }
            if (isEmpty) break;
        }
        if (!isEmpty) return true;

        for (let num = 1; num <= 9; num++) {
            if (this.isSafe(grid, row, col, num)) { grid[row][col] = num; if (this.solveGrid(grid)) return true; grid[row][col] = 0; }
        }
        return false;
    }

    handleCellClick(r, c) {
        this.initAudio(); 
        if (this.isPaused || document.getElementById('stats-screen').classList.contains('active')) return;
        
        if (this.selectedNumber !== null) {
            if (this.selectedNumber === 0) this.applyErase(r, c); else this.applyNumber(this.selectedNumber, r, c);
            this.highlightCells(); 
        } else {
            this.selectedCell = (this.selectedCell && this.selectedCell.r === r && this.selectedCell.c === c) ? null : {r, c};
            this.highlightCells();
        }
    }

    handleNumpadClick(num) {
        this.initAudio(); 
        if (this.isPaused || document.getElementById('stats-screen').classList.contains('active')) return;

        if (this.selectedCell !== null) this.applyNumber(num, this.selectedCell.r, this.selectedCell.c);
        else { this.selectedNumber = (this.selectedNumber === num) ? null : num; this.updateNumpadUI(); this.highlightCells(); }
    }

    toggleEraser() {
        if (this.isPaused) return;
        if (this.selectedCell !== null) this.applyErase(this.selectedCell.r, this.selectedCell.c);
        else { this.selectedNumber = (this.selectedNumber === 0) ? null : 0; this.updateNumpadUI(); this.highlightCells(); }
    }

    updateNumpadUI() {
        for (let i = 1; i <= 9; i++) document.getElementById(`numpad-${i}`).classList.toggle('active', this.selectedNumber === i);
        document.getElementById('erase-btn').classList.toggle('active', this.selectedNumber === 0);
    }

    applyNumber(num, r, c) {
        const cellEl = this.boardEl.children[r * 9 + c];
        if (cellEl.classList.contains('fixed')) return;

        if (this.notesMode) {
            if (this.grid[r][c] !== 0) return; 
            if (this.notes[r][c].has(num)) this.notes[r][c].delete(num); else this.notes[r][c].add(num);
            this.renderNotes(r, c);
        } else {
            if (this.grid[r][c] === num) return; 

            if (this.solution[r][c] === num) {
                this.grid[r][c] = num; cellEl.querySelector('.val').textContent = num; cellEl.classList.add('user'); cellEl.classList.remove('error');
                this.notes[r][c].clear(); this.renderNotes(r, c); this.clearRelatedNotes(r, c, num); this.highlightCells();
                
                if (this.mode === 'ice') {
                    if (this.ice[r][c] > 0) this.playIceBreakSound(); 
                    this.ice[r][c] = 0; this.renderIce(r, c); this.triggerShockwave(r, c);
                } else { this.checkWin(); }
            } else {
                cellEl.querySelector('.val').textContent = num; cellEl.classList.add('error'); this.mistakes++;
                setTimeout(() => { if (this.grid[r][c] === 0) cellEl.querySelector('.val').textContent = ''; cellEl.classList.remove('error'); }, 1000);
                if (this.mistakes >= 3) this.gameOver();
            }
            this.updateStats();
        }
    }

    triggerShockwave(originR, originC) {
        const cellsToBreak = [];
        for (let i = 0; i < 9; i++) { if (i !== originC) cellsToBreak.push({cr: originR, cc: i}); if (i !== originR) cellsToBreak.push({cr: i, cc: originC}); }
        let startR = originR - originR % 3, startC = originC - originC % 3;
        for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) if (startR + i !== originR && startC + j !== originC) cellsToBreak.push({cr: startR + i, cc: startC + j});
        
        const uniqueCells = []; const seen = new Set();
        for (const cell of cellsToBreak) { const key = `${cell.cr},${cell.cc}`; if (!seen.has(key)) { seen.add(key); uniqueCells.push(cell); } }

        let maxDelay = 0;
        uniqueCells.forEach(({cr, cc}) => {
            const delay = (Math.abs(originR - cr) + Math.abs(originC - cc)) * 40;
            if (delay > maxDelay) maxDelay = delay;
            setTimeout(() => {
                const cellEl = this.boardEl.children[cr * 9 + cc];
                cellEl.classList.remove('shockwave'); void cellEl.offsetWidth; cellEl.classList.add('shockwave');
                if (this.ice[cr][cc] > 0) { this.ice[cr][cc]--; this.renderIce(cr, cc); this.playIceCrackSound(0); }
            }, delay);
        });
        setTimeout(() => this.checkIceWin(), maxDelay + 400);
    }

    checkIceWin() {
        if (this.mode !== 'ice') return;
        let iceRemaining = false;
        for (let r=0; r<9; r++) for (let c=0; c<9; c++) if (this.ice[r][c] > 0) iceRemaining = true;
        if (!iceRemaining) { document.getElementById('win-title').textContent = "Ice Shattered! You Win!"; this.handleWin(); }
    }

    applyErase(r, c) {
        const cellEl = this.boardEl.children[r * 9 + c];
        if (cellEl.classList.contains('fixed')) return;
        this.grid[r][c] = 0; cellEl.querySelector('.val').textContent = ''; cellEl.classList.remove('user', 'error');
        this.highlightCells();
    }

    renderBoard() {
        const cells = this.boardEl.children;
        for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
                const cell = cells[r * 9 + c]; const val = this.grid[r][c];
                cell.className = 'cell'; 
                if (val !== 0) { cell.querySelector('.val').textContent = val; cell.classList.add('fixed'); } else { cell.querySelector('.val').textContent = ''; }
                cell.classList.toggle('parity-even', this.parity[r][c] === 'even');
                this.renderNotes(r, c); this.renderIce(r, c); this.renderInequalities(r, c); this.renderCages(r, c, cell);
            }
        }
    }

    renderCages(r, c, cellEl) {
        const cageSumEl = document.getElementById(`cage-sum-${r}-${c}`);
        if (this.mode === 'killer') {
            const cageId = this.cageGrid[r][c]; const cage = this.cages.find(cg => cg.id === cageId);
            if (r === 0 || this.cageGrid[r-1][c] !== cageId) cellEl.classList.add('cage-t');
            if (r === 8 || this.cageGrid[r+1][c] !== cageId) cellEl.classList.add('cage-b');
            if (c === 0 || this.cageGrid[r][c-1] !== cageId) cellEl.classList.add('cage-l');
            if (c === 8 || this.cageGrid[r][c+1] !== cageId) cellEl.classList.add('cage-r');
            if (cage.cells[0].r === r && cage.cells[0].c === c) { cageSumEl.textContent = cage.sum; cageSumEl.classList.add('active'); } else cageSumEl.classList.remove('active');
        } else { cageSumEl.classList.remove('active'); }
    }

    renderInequalities(r, c) {
        if (c % 3 !== 2) { const el = document.getElementById(`ineq-h-${r}-${c}`); if(el) { el.textContent = this.hIneq[r][c]; el.style.display = this.mode === 'greater' ? 'flex' : 'none'; } }
        if (r % 3 !== 2) { const el = document.getElementById(`ineq-v-${r}-${c}`); if(el) { el.textContent = this.vIneq[r][c]; el.style.display = this.mode === 'greater' ? 'flex' : 'none'; } }
    }

    renderIce(r, c) {
        const cell = this.boardEl.children[r * 9 + c];
        cell.classList.remove('ice-1', 'ice-2', 'ice-3');
        if (this.ice[r][c] > 0) cell.classList.add(`ice-${this.ice[r][c]}`);
    }

    renderNotes(r, c) {
        for (let i = 1; i <= 9; i++) document.getElementById(`note-${r}-${c}-${i}`).textContent = this.notes[r][c].has(i) ? i : '';
    }

    highlightCells() {
        const cells = Array.from(this.boardEl.children);
        cells.forEach(cell => cell.classList.remove('selected', 'related', 'same-num'));

        if (this.selectedNumber !== null && this.selectedNumber > 0) {
            cells.forEach(cell => { if (this.grid[parseInt(cell.dataset.r)][parseInt(cell.dataset.c)] === this.selectedNumber) cell.classList.add('same-num'); }); return; 
        }

        if (!this.selectedCell) return;
        const {r, c} = this.selectedCell; const selectedVal = this.grid[r][c];

        cells.forEach(cell => {
            const cr = parseInt(cell.dataset.r), cc = parseInt(cell.dataset.c);
            const sameBox = Math.floor(cr / 3) === Math.floor(r / 3) && Math.floor(cc / 3) === Math.floor(c / 3);
            if (cr === r || cc === c || sameBox) cell.classList.add('related');
            if (this.mode === 'killer' && this.cageGrid[cr][cc] === this.cageGrid[r][c]) cell.classList.add('related');
            if (selectedVal !== 0 && this.grid[cr][cc] === selectedVal) cell.classList.add('same-num');
        });

        cells[r * 9 + c].classList.add('selected'); cells[r * 9 + c].classList.remove('related');
    }

    clearRelatedNotes(r, c, num) {
        for(let i=0; i<9; i++) { this.notes[r][i].delete(num); this.renderNotes(r, i); this.notes[i][c].delete(num); this.renderNotes(i, c); }
        let startR = r - r % 3, startC = c - c % 3;
        for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) { this.notes[startR + i][startC + j].delete(num); this.renderNotes(startR + i, startC + j); }
    }

    toggleNotes() { this.notesMode = !this.notesMode; document.getElementById('notes-btn').classList.toggle('active', this.notesMode); }

    useHint() {
        if (!this.selectedCell || this.isPaused) return; 
        const {r, c} = this.selectedCell; if (this.grid[r][c] !== 0) return;
        const prev = this.notesMode; this.notesMode = false; this.applyNumber(this.solution[r][c], r, c); this.notesMode = prev;
    }

    startTimer() { this.timerInterval = setInterval(() => { if (!this.isPaused) { this.time++; this.updateStats(); } }, 1000); }
    formatTime(seconds) { return `${Math.floor(seconds / 60).toString().padStart(2, '0')}:${(seconds % 60).toString().padStart(2, '0')}`; }
    updateStats() { document.getElementById('timer').textContent = this.formatTime(this.time); document.getElementById('mistakes').textContent = this.mistakes; }

    togglePause() {
        if (document.getElementById('stats-screen').classList.contains('active') && !this.isPaused) return;
        this.isPaused = !this.isPaused;
        document.getElementById('pause-screen').classList.toggle('active', this.isPaused);
        document.getElementById('pause-btn').textContent = this.isPaused ? 'Resume' : 'Pause';
    }

    checkWin() {
        if (this.mode === 'ice') return; 
        for (let r = 0; r < 9; r++) for (let c = 0; c < 9; c++) if (this.grid[r][c] !== this.solution[r][c]) return;
        document.getElementById('win-title').textContent = "Puzzle Solved!"; this.handleWin();
    }

    async handleWin() {
        clearInterval(this.timerInterval);
        this.playerStats.totalGames++;
        const currentDifficulty = document.getElementById('difficulty').value;
        if (this.time < this.playerStats.bestTimes[currentDifficulty]) this.playerStats.bestTimes[currentDifficulty] = this.time;
        
        this.saveLocalStats();
        if(window.saveToCloud) await window.saveToCloud(this.playerStats);
        
        document.getElementById('final-time').textContent = this.formatTime(this.time);
        document.getElementById('win-screen').classList.add('active');
    }

    gameOver() { clearInterval(this.timerInterval); document.getElementById('lose-screen').classList.add('active'); }

    setupKeyboard() {
        window.addEventListener('keydown', (e) => {
            if(!this.isInitialized) return;
            this.initAudio(); 
            if (this.isPaused || document.getElementById('win-screen').classList.contains('active') || document.getElementById('stats-screen').classList.contains('active')) return;
            if (e.key >= '1' && e.key <= '9') this.handleNumpadClick(parseInt(e.key));
            if (e.key === 'Backspace' || e.key === 'Delete') { if (this.selectedCell) this.applyErase(this.selectedCell.r, this.selectedCell.c); else this.toggleEraser(); }
            if (e.key.toLowerCase() === 'n') this.toggleNotes();
            if (this.selectedCell && this.selectedNumber === null) {
                let {r, c} = this.selectedCell;
                switch(e.key) { case 'ArrowUp': r = (r - 1 + 9) % 9; break; case 'ArrowDown': r = (r + 1) % 9; break; case 'ArrowLeft': c = (c - 1 + 9) % 9; break; case 'ArrowRight': c = (c + 1) % 9; break; default: return; }
                this.handleCellClick(r, c);
            } else if (e.key.startsWith('Arrow') && this.selectedNumber === null) this.handleCellClick(4, 4); 
        });
    }
}

// Instantiate globally
window.game = new SudokuGame();
</script>
